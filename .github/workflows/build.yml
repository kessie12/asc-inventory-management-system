name: Build
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          args: >
            -Dsonar.organization=kessie12
            -Dsonar.projectKey=kessie12_asc-inventory-management-system
            -Dsonar.sources=.
            -Dsonar.language=php
            -Dsonar.exclusions=vendor/**,screenshots/**,data/**
